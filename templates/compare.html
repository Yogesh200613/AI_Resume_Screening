<!DOCTYPE html>
<html>
<head>
    <title>Resume Comparison</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

<h1>📊 Resume Comparison</h1>

<table border="1" cellpadding="10">

<tr>
    <th>Resume</th>
    <th>Score</th>
    <th>JD Match</th>
</tr>

{% for row in data %}

<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}%</td>
    <td>{{ row[2] }}%</td>
</tr>

{% endfor %}

</table>

<br>

<a href="/dashboard">
    <button>Back</button>
</a>

</div>

</body>
</html>
