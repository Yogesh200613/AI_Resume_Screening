<!DOCTYPE html>
<html>
<head>
    <title>Resume History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

<h1>📄 My Resume History</h1>

<table border="1" cellpadding="10">

<tr>
    <th>Resume</th>
    <th>Score</th>
    <th>JD Match</th>
    <th>Recommendation</th>
</tr>

{% for row in data %}

<tr>

<td>{{ row[0] }}</td>
<td>{{ row[1] }}%</td>
<td>{{ row[2] }}%</td>
<td>{{ row[3] }}</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/profile">
    <button>Back to Profile</button>
</a>

</div>

</body>
</html>
